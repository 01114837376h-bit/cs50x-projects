<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
        <link href="styles.css" rel="stylesheet">
        <title>Home</title>
    </head>
    
    <body class="dark">

        <header class="py-3 border-bottom shadow-sm bg-surface">
            <div class="container d-flex justify-content-between align-items-center">
                <span class="fw-bold fs-5 text-gradient">Dev.Portfolio</span>
                <button id="themeToggle" class="btn btn-sm btn-outline-custom" onclick="toggleTheme()">Toggle Mode</button>
                <p id="themeStatus" class="mb-0 text-muted">Current Theme: Light</p>
            </div>
        </header>

        <main class="container my-5">
            <div class="p-5 rounded-4 bg-surface shadow-sm hero-card">
                <h1 class="display-5 fw-bold mb-3" id="greeting">Welcome to My Webpage</h1>
                <p class="fs-5 text-muted mb-4">
                    Hi, this is my website page. Here you can learn anything you want to learn about me. You will find data about me that leads you toward links about what I have achieved so far.
                </p>
                <button class="btn btn-custom-primary btn-lg px-4">Click Me!</button>
            </div>
        </main>

        <nav class="fixed-bottom py-4 bg-surface border-top">
            <form id="navForm" action="" method="GET">
                <div class="container d-flex gap-2 justify-content-start">
                    <button type="submit" class="btn btn-custom-nav" data-page="index.html" onclick="this.form.action='index.html'">Home</button>
                    <button type="submit" class="btn btn-custom-nav" data-page="about.html" onclick="this.form.action='about.html'">About</button>
                    <button type="submit" class="btn btn-custom-nav" data-page="Service.html" onclick="this.form.action='Service.html'">Services</button>
                    <button type="submit" class="btn btn-custom-nav" data-page="Contact.html" onclick="this.form.action='Contact.html'">Contact</button>
                </div>
            </form>
        </nav>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
        <script src="logic.js"></script>
    </body>
</html>
